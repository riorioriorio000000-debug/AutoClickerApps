name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
    - name: Build APK
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
        unzip -q gradle.zip
        ./gradle-8.2/bin/gradle assembleDebug --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AutoClicker-APK
        path: app/build/outputs/apk/debug/app-debug.apk
